name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - beta
      dry_run:
        description: "Dry run (don't push or create release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]" build

      - name: Run tests
        run: pytest tests/ -v

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(python -c "from cqltrack import __version__; print(__version__)")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          # parse current version (strip any -beta.N suffix)
          BASE=$(echo "$CURRENT" | sed 's/-beta\.[0-9]*//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          BUMP="${{ inputs.version_bump }}"

          if [ "$BUMP" = "major" ]; then
            NEXT="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEXT="${MAJOR}.$((MINOR + 1)).0"
          elif [ "$BUMP" = "patch" ]; then
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          elif [ "$BUMP" = "beta" ]; then
            # if already a beta, increment beta number
            if echo "$CURRENT" | grep -q "beta"; then
              BETA_NUM=$(echo "$CURRENT" | grep -o 'beta\.[0-9]*' | cut -d. -f2)
              NEXT="${BASE}-beta.$((BETA_NUM + 1))"
            else
              # first beta for next minor
              NEXT="${MAJOR}.$((MINOR + 1)).0-beta.1"
            fi
          fi

          IS_BETA="false"
          if echo "$NEXT" | grep -q "beta"; then
            IS_BETA="true"
          fi

          RELEASE_BRANCH="release/v${NEXT}"

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT -> Next: $NEXT (beta=$IS_BETA, branch=$RELEASE_BRANCH)"

      - name: Bump version in source
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEXT\"/" cqltrack/__init__.py
          echo "Updated version to $NEXT"

      - name: Create release branch and commit
        if: ${{ inputs.dry_run == false }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          BRANCH="${{ steps.version.outputs.release_branch }}"

          git checkout -b "$BRANCH"
          git add pyproject.toml cqltrack/__init__.py
          git commit -m "Bump version to ${NEXT}"
          git push origin "$BRANCH"

      - name: Merge to main and tag (stable releases)
        if: ${{ inputs.dry_run == false && steps.version.outputs.is_beta == 'false' }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          BRANCH="${{ steps.version.outputs.release_branch }}"

          # merge release branch into main
          git checkout main 2>/dev/null || git checkout -b main origin/main 2>/dev/null || git checkout -b main
          git merge --no-ff "$BRANCH" -m "Release v${NEXT}"
          git tag -a "v${NEXT}" -m "Release v${NEXT}"
          git push origin main
          git push origin "v${NEXT}"

          # merge back to develop so version stays in sync
          git checkout develop
          git merge --no-ff main -m "Merge release v${NEXT} back to develop"
          git push origin develop

      - name: Tag beta release
        if: ${{ inputs.dry_run == false && steps.version.outputs.is_beta == 'true' }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          BRANCH="${{ steps.version.outputs.release_branch }}"

          git tag -a "v${NEXT}" -m "Beta release v${NEXT}"
          git push origin "v${NEXT}"

          # merge beta version bump back to develop
          git checkout develop
          git merge --no-ff "$BRANCH" -m "Merge beta v${NEXT} back to develop"
          git push origin develop

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.next }}"
          name: "v${{ steps.version.outputs.next }}"
          prerelease: ${{ steps.version.outputs.is_beta == 'true' }}
          generate_release_notes: true
          files: dist/*

      - name: Summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.next }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Type**: ${{ inputs.version_bump }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Beta**: ${{ steps.version.outputs.is_beta }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run**: ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI**: https://pypi.org/project/cql-track/${{ steps.version.outputs.next }}/" >> "$GITHUB_STEP_SUMMARY"
